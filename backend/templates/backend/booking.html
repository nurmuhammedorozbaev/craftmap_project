{% extends "backend/base.html" %}
{% block title %}Бронирование{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white/90 rounded-xl shadow-lg p-8 border border-green-700">
    <h3 class="text-2xl font-bold text-green-800 mb-6 text-center">
        Бронирование ремесла: {{ craft.name }}
    </h3>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" 
                class="w-full bg-green-800 text-white font-semibold py-2 px-4 rounded-lg hover:bg-green-900 transition">
            Забронировать
        </button>
    </form>
</div>
{% endblock %}
