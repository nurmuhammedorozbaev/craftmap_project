{% extends "backend/base.html" %}
{% block title %}Бронирование{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow-md p-6 border border-green-200">
    <h3 class="text-xl font-semibold text-green-700 mb-4">
        Бронирование ремесла: {{ craft.name }}
    </h3>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" 
                class="w-full bg-green-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-green-700 transition">
            Забронировать
        </button>
    </form>
</div>
{% endblock %}
