{% extends 'backend/base.html' %}
{% block title %}Заявка отправлена{% endblock %}

{% block content %}
<section class="py-12 px-6 bg-gradient-to-r from-green-100 via-white to-green-200 min-h-screen">
    <div class="max-w-lg mx-auto bg-white/90 rounded-xl shadow-lg p-8 border border-green-300 text-center">
        <h2 class="text-2xl font-bold text-green-800 mb-4">Спасибо, {{ name }}!</h2>
        <p class="text-gray-700 mb-4">
            Ваша заявка на <span class="font-semibold text-green-800">"{{ craft.name }}"</span> успешно отправлена.
        </p>
        <a href="{% url 'backend:crafts' %}" 
           class="inline-block bg-green-800 text-white py-2 px-6 rounded-lg font-semibold hover:bg-green-900 transition">
           ← Вернуться к списку ремёсел
        </a>
    </div>
</section>
{% endblock %}
