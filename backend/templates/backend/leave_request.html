{% extends 'backend/base.html' %}
{% block title %}Заявка на {{ craft.name }}{% endblock %}

{% block content %}
<section class="py-12 px-6 bg-gradient-to-r from-green-100 via-white to-green-200 min-h-screen">
    <div class="max-w-lg mx-auto bg-white/90 rounded-xl shadow-lg p-8 border border-green-300 space-y-6">
        <h2 class="text-2xl font-bold text-green-800 mb-6 text-center">
            Заявка на "{{ craft.name }}"
        </h2>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <!-- Имя -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Ваше имя</label>
                <input type="text" name="name" required
                       class="w-full border border-green-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-700 focus:outline-none">
            </div>

            <!-- Телефон -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Телефон</label>
                <input type="text" name="phone" required
                       class="w-full border border-green-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-700 focus:outline-none">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                       class="w-full border border-green-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-700 focus:outline-none">
            </div>

            <!-- Комментарий -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Комментарий</label>
                <textarea name="comment" rows="4"
                          class="w-full border border-green-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-green-700 focus:outline-none"></textarea>
            </div>

            <!-- Кнопка -->
            <button type="submit"
                    class="w-full bg-green-800 text-white font-semibold py-2 px-4 rounded-lg hover:bg-green-900 transition">
                Отправить заявку
            </button>
        </form>
    </div>
</section>
{% endblock %}
