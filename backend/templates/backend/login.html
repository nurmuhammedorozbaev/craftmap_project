{% extends 'backend/base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<section class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-8 border border-green-300">
    <h2 class="text-2xl font-bold text-green-800 mb-6 text-center">Вход</h2>
    <p class="text-center text-gray-700 mb-6">
        Войдите в аккаунт, чтобы продолжить работу, сохранять избранное и следить за заказами.
    </p>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        <!-- Email -->
        <div>
            <label for="id_email" class="block text-gray-700 font-medium mb-1">E-mail *</label>
            <input type="email" name="email" id="id_email" 
                   class="w-full border border-green-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-700" 
                   required>
        </div>
        
        <!-- Пароль -->
        <div>
            <label for="id_password" class="block text-gray-700 font-medium mb-1">Пароль *</label>
            <div class="relative">
                <input type="password" name="password" id="id_password" 
                       class="w-full border border-green-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-700" 
                       required>
                <button type="button" 
                        onclick="togglePassword()" 
                        class="absolute inset-y-0 right-0 px-3 text-sm text-green-700 hover:text-green-900">
                    Показать
                </button>
            </div>
        </div>
        
        <!-- Кнопка входа -->
        <button type="submit" 
                class="w-full bg-green-800 text-white font-semibold py-2 px-4 rounded-lg 
                       hover:bg-green-900 transition">
            Войти
        </button>
    </form>
    
    <div class="mt-6 text-center text-gray-700">
        Ещё нет аккаунта? 
        <a href="{% url 'backend:register' %}" 
           class="text-green-700 font-semibold hover:text-green-900">
            Зарегистрироваться
        </a>
    </div>
</section>

<script>
function togglePassword() {
    const input = document.getElementById("id_password");
    const btn = event.target;
    if (input.type === "password") {
        input.type = "text";
        btn.textContent = "Скрыть";
    } else {
        input.type = "password";
        btn.textContent = "Показать";
    }
}
</script>
{% endblock %}
