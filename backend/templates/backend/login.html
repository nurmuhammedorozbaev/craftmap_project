{% extends 'backend/base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<section class="max-w-md mx-auto bg-white rounded-xl shadow-md p-8 border border-green-200">
    <h2 class="text-2xl font-bold text-green-700 mb-6 text-center">Вход</h2>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" 
                class="w-full bg-green-600 text-white font-semibold py-2 px-4 rounded-lg 
                       hover:bg-green-700 transition relative overflow-hidden">
            <span class="relative z-10">Войти</span>
            <!-- подсветка снизу -->
            <span class="absolute bottom-0 left-0 w-full h-1 bg-green-400 transform scale-x-0 
                         group-hover:scale-x-100 transition-transform duration-300"></span>
        </button>
    </form>
    
    <div class="mt-6 text-center text-gray-700">
        Нет аккаунта? 
        <a href="{% url 'backend:register' %}" 
           class="text-green-600 font-semibold relative inline-block 
                  after:block after:h-[2px] after:bg-green-600 after:scale-x-0 
                  hover:after:scale-x-100 after:transition-transform after:duration-300 after:origin-left">
            Зарегистрируйтесь
        </a>
    </div>
</section>
{% endblock %}
